name = "clawbridge-telemetry-relay"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV namespace for rate limiting
# After deploying, create this with: wrangler kv namespace create RATE_LIMIT_KV
# Then paste the id below
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[triggers]
# Custom domain: point telemetry.clawbridgeagency.com CNAME to clawbridge-telemetry-relay.workers.dev
# in your DNS, then add it here:
# routes = [{ pattern = "telemetry.clawbridgeagency.com/report", zone_name = "clawbridgeagency.com" }]
