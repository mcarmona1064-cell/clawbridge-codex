networks:
  clawbridge-nango:
    driver: bridge

services:
  nango-db:
    image: postgres:16-alpine
    container_name: nango-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NANGO_DB_USER}
      POSTGRES_PASSWORD: ${NANGO_DB_PASSWORD}
      POSTGRES_DB: ${NANGO_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - nango-db-data:/var/lib/postgresql/data
    networks:
      - clawbridge-nango
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NANGO_DB_USER} -d ${NANGO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nango-redis:
    image: redis:7-alpine
    container_name: nango-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nango-redis-data:/data
    networks:
      - clawbridge-nango
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nango-server:
    image: nangohq/nango-server:hosted
    platform: linux/amd64
    container_name: nango-server
    restart: unless-stopped
    env_file: .env
    environment:
      - NANGO_DB_HOST=${NANGO_DB_HOST}
      - NANGO_DB_PORT=${NANGO_DB_PORT}
      - NANGO_DB_USER=${NANGO_DB_USER}
      - NANGO_DB_PASSWORD=${NANGO_DB_PASSWORD}
      - NANGO_DB_NAME=${NANGO_DB_NAME}
      - NANGO_REDIS_URL=${NANGO_REDIS_URL}
      - NANGO_SECRET_KEY=${NANGO_SECRET_KEY}
      - NANGO_ENCRYPTION_KEY=${NANGO_ENCRYPTION_KEY}
      - SERVER_URL=${SERVER_URL}
      - CONNECT_URL=${CONNECT_URL}
    ports:
      - "3003:8080"
      - "3009:3009"
    networks:
      - clawbridge-nango
    depends_on:
      nango-db:
        condition: service_healthy
      nango-redis:
        condition: service_healthy

  # ── Hindsight memory (optional — enables semantic per-client memory) ──────────
  hindsight-db:
    image: pgvector/pgvector:pg17
    platform: linux/amd64
    container_name: hindsight-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hindsight
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - hindsight-db-data:/var/lib/postgresql/data
    networks:
      - clawbridge-nango
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight -d hindsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  hindsight-api:
    image: ghcr.io/vectorize-io/hindsight:latest
    platform: linux/amd64
    container_name: hindsight-api
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9999:9999"
    depends_on:
      hindsight-db:
        condition: service_healthy
    networks:
      - clawbridge-nango
    environment:
      HINDSIGHT_API_DATABASE_URL: postgresql://hindsight:${HINDSIGHT_DB_PASSWORD}@hindsight-db:5432/hindsight
      # LLM — uses your Claude subscription OAuth token
      HINDSIGHT_API_LLM_PROVIDER: anthropic
      HINDSIGHT_API_LLM_API_KEY: ${CLAUDE_CODE_OAUTH_TOKEN}
      # Haiku for extraction (cheap + fast), Sonnet for reflection (better reasoning)
      HINDSIGHT_API_RETAIN_LLM_MODEL: claude-haiku-4-5-20251001
      HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: claude-haiku-4-5-20251001
      HINDSIGHT_API_REFLECT_LLM_MODEL: claude-sonnet-4-5-20250929
      # Full image includes local embeddings + reranker — no OpenAI needed
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: local
      HINDSIGHT_API_RERANKER_PROVIDER: local
      # Auth
      HINDSIGHT_API_TENANT_API_KEY: ${HINDSIGHT_API_KEY}
      # MCP server (lets Claude Code/Desktop agents use memory as tools)
      HINDSIGHT_API_MCP_ENABLED: "true"
      HINDSIGHT_API_LOG_LEVEL: info

volumes:
  nango-db-data:
  nango-redis-data:
  hindsight-db-data:
