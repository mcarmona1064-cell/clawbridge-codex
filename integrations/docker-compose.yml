version: "3.9"

networks:
  clawbridge-nango:
    driver: bridge

services:
  nango-db:
    image: postgres:16-alpine
    container_name: nango-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NANGO_DB_USER}
      POSTGRES_PASSWORD: ${NANGO_DB_PASSWORD}
      POSTGRES_DB: ${NANGO_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - nango-db-data:/var/lib/postgresql/data
    networks:
      - clawbridge-nango
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NANGO_DB_USER} -d ${NANGO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nango-redis:
    image: redis:7-alpine
    container_name: nango-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nango-redis-data:/data
    networks:
      - clawbridge-nango
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nango-server:
    image: nangohq/nango:hosted
    platform: linux/amd64
    container_name: nango-server
    restart: unless-stopped
    env_file: .env
    environment:
      - NANGO_DB_HOST=${NANGO_DB_HOST}
      - NANGO_DB_PORT=${NANGO_DB_PORT}
      - NANGO_DB_USER=${NANGO_DB_USER}
      - NANGO_DB_PASSWORD=${NANGO_DB_PASSWORD}
      - NANGO_DB_NAME=${NANGO_DB_NAME}
      - NANGO_REDIS_URL=${NANGO_REDIS_URL}
      - NANGO_SECRET_KEY=${NANGO_SECRET_KEY}
      - NANGO_ENCRYPTION_KEY=${NANGO_ENCRYPTION_KEY}
      - SERVER_URL=${SERVER_URL}
      - CONNECT_URL=${CONNECT_URL}
    ports:
      - "3003:3003"
      - "3009:3009"
    networks:
      - clawbridge-nango
    depends_on:
      nango-db:
        condition: service_healthy
      nango-redis:
        condition: service_healthy

volumes:
  nango-db-data:
  nango-redis-data:
