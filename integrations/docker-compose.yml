networks:
  clawbridge:
    driver: bridge

services:
  # ── Hindsight memory (optional — enables semantic per-client memory) ──────────
  hindsight-db:
    image: pgvector/pgvector:pg17
    platform: linux/amd64
    container_name: hindsight-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hindsight
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD}
    ports:
      - '5434:5432'
    volumes:
      - hindsight-db-data:/var/lib/postgresql/data
    networks:
      - clawbridge
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hindsight -d hindsight']
      interval: 10s
      timeout: 5s
      retries: 5

  hindsight-api:
    image: ghcr.io/vectorize-io/hindsight:latest
    platform: linux/amd64
    container_name: hindsight-api
    restart: unless-stopped
    ports:
      - '8888:8888'
      - '9999:9999'
    depends_on:
      hindsight-db:
        condition: service_healthy
    networks:
      - clawbridge
    environment:
      HINDSIGHT_API_DATABASE_URL: postgresql://hindsight:${HINDSIGHT_DB_PASSWORD}@hindsight-db:5432/hindsight
      # LLM — uses OpenAI by default; set HINDSIGHT_LLM_API_KEY to isolate billing/limits
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY:-${OPENAI_API_KEY}}
      # Small model for retain/consolidation, larger model for reflection
      HINDSIGHT_API_RETAIN_LLM_MODEL: gpt-4o-mini
      HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: gpt-4o-mini
      HINDSIGHT_API_REFLECT_LLM_MODEL: gpt-4o
      # Full image includes local embeddings + reranker — no OpenAI needed
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: local
      HINDSIGHT_API_RERANKER_PROVIDER: local
      # Auth
      HINDSIGHT_API_TENANT_API_KEY: ${HINDSIGHT_API_KEY}
      # MCP server (lets Claude Code/Desktop agents use memory as tools)
      HINDSIGHT_API_MCP_ENABLED: 'true'
      HINDSIGHT_API_LOG_LEVEL: info

volumes:
  hindsight-db-data:
