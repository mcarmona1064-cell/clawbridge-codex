<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawBridge — Connect Your Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #293548;
      --border: #334155;
      --orange: #f97316;
      --orange-dim: #c2571b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .client-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .client-badge span { color: var(--text); font-weight: 600; }

    /* Hero */
    .hero {
      text-align: center;
      padding: 56px 32px 40px;
    }
    .hero h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--orange);
    }
    .hero p {
      color: var(--muted);
      font-size: 1.1rem;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    /* Search */
    .search-wrap {
      max-width: 420px;
      margin: 0 auto;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--orange); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    /* Main layout */
    main { max-width: 1100px; margin: 0 auto; padding: 0 24px 64px; }

    /* Section */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 40px 0 16px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover { border-color: var(--orange); transform: translateY(-2px); }
    .card.connected { border-color: var(--green); }

    .card-header { display: flex; align-items: center; gap: 12px; }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .card-name { font-weight: 600; font-size: 0.95rem; }
    .card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }

    .btn-connect {
      margin-top: auto;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      background: var(--orange);
      color: white;
    }
    .btn-connect:hover { background: var(--orange-dim); }
    .btn-connect:disabled { opacity: 0.5; cursor: default; }

    .btn-connected {
      margin-top: auto;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--green);
      font-size: 0.85rem;
      font-weight: 600;
      background: transparent;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Loading / toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; }
    #toast.error { border-color: #ef4444; color: #f87171; }
    #toast.success { border-color: var(--green); color: var(--green); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">🦀</div>
    ClawBridge
  </a>
  <div class="client-badge">
    Client: <span id="client-id-display">loading...</span>
  </div>
</header>

<div class="hero">
  <h1>Connect Your <em>Apps</em></h1>
  <p>Give your AI agent access to your tools — calendar, email, CRM, payments, and more.</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Search 700+ integrations..." />
  </div>
</div>

<main>
  <div id="featured-section">
    <div class="section-label">Featured Integrations</div>
    <div class="grid" id="featured-grid"></div>
  </div>

  <div id="all-section">
    <div class="section-label">All Integrations</div>
    <div class="grid" id="all-grid"></div>
  </div>
</main>

<div id="toast"></div>

<script>
  // -------------------------------------------------------------------------
  // Config
  // -------------------------------------------------------------------------
  const API_BASE = "";                      // same origin as the portal server
  const params   = new URLSearchParams(window.location.search);
  const clientId = params.get("client_id") || "demo-client";

  document.getElementById("client-id-display").textContent = clientId;

  // -------------------------------------------------------------------------
  // Featured integrations definition
  // -------------------------------------------------------------------------
  const FEATURED = [
    { key: "google-calendar", name: "Google Calendar",  icon: "📅", desc: "Create events, check schedules, set reminders" },
    { key: "gmail",           name: "Gmail",            icon: "📧", desc: "Send emails, read inbox, manage threads" },
    { key: "hubspot",         name: "HubSpot",          icon: "🧡", desc: "Manage contacts, deals, and pipelines" },
    { key: "slack",           name: "Slack",            icon: "💬", desc: "Send messages, read channels, post updates" },
    { key: "stripe",          name: "Stripe",           icon: "💳", desc: "View payments, look up customers, track revenue" },
    { key: "notion",          name: "Notion",           icon: "📝", desc: "Search pages, create docs, update databases" },
    { key: "google-drive",    name: "Google Drive",     icon: "📁", desc: "Read and write files, search documents" },
    { key: "linkedin",        name: "LinkedIn",         icon: "💼", desc: "Post updates, research contacts" },
    { key: "calendly",        name: "Calendly",         icon: "🗓️",  desc: "Schedule meetings, manage availability" },
    { key: "quickbooks",      name: "QuickBooks",       icon: "📊", desc: "View invoices, expenses, financial reports" },
    { key: "shopify",         name: "Shopify",          icon: "🛍️",  desc: "Manage orders, products, and customers" },
    { key: "salesforce",      name: "Salesforce",       icon: "☁️",  desc: "CRM contacts, opportunities, accounts" },
  ];

  // -------------------------------------------------------------------------
  // State
  // -------------------------------------------------------------------------
  let connectedSet = new Set();
  let allProviders = [];

  // -------------------------------------------------------------------------
  // UI helpers
  // -------------------------------------------------------------------------
  function showToast(msg, type = "info") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => { el.className = ""; }, 3500);
  }

  function buildCard(integration, connected) {
    const card = document.createElement("div");
    card.className = `card${connected ? " connected" : ""}`;
    card.dataset.key = integration.key;
    card.dataset.name = (integration.name || integration.key).toLowerCase();

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${integration.icon || "🔌"}</div>
        <div class="card-name">${integration.name || integration.key}</div>
      </div>
      <div class="card-desc">${integration.desc || integration.key}</div>
      ${connected
        ? `<div class="btn-connected"><span>✓</span> Connected</div>`
        : `<button class="btn-connect" onclick="connect('${integration.key}', this)">Connect</button>`
      }
    `;
    return card;
  }

  function renderFeatured() {
    const grid = document.getElementById("featured-grid");
    grid.innerHTML = "";
    for (const integ of FEATURED) {
      grid.appendChild(buildCard(integ, connectedSet.has(integ.key)));
    }
  }

  function renderAll(providers) {
    const grid = document.getElementById("all-grid");
    grid.innerHTML = "";
    const featuredKeys = new Set(FEATURED.map(f => f.key));
    for (const p of providers) {
      if (!featuredKeys.has(p.key)) {
        grid.appendChild(buildCard({ key: p.key, name: p.display_name || p.key, icon: "🔌", desc: p.key }, connectedSet.has(p.key)));
      }
    }
  }

  // -------------------------------------------------------------------------
  // Search
  // -------------------------------------------------------------------------
  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll(".card").forEach(card => {
      const match = !q || card.dataset.name.includes(q) || card.dataset.key.includes(q);
      card.classList.toggle("hidden", !match);
    });
    // Show/hide section labels depending on whether any cards are visible
    ["featured-section", "all-section"].forEach(id => {
      const section = document.getElementById(id);
      const visible = section.querySelectorAll(".card:not(.hidden)").length > 0;
      section.classList.toggle("hidden", !visible);
    });
  });

  // -------------------------------------------------------------------------
  // Connect handler
  // -------------------------------------------------------------------------
  async function connect(integration, btn) {
    btn.disabled = true;
    btn.textContent = "Opening...";
    try {
      const res = await fetch(`${API_BASE}/api/connect`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_id: clientId, integration }),
      });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const { url } = await res.json();
      const popup = window.open(url, "nango-auth", "width=600,height=700,scrollbars=yes");

      // Poll for the popup closing, then refresh connections
      const poll = setInterval(async () => {
        if (!popup || popup.closed) {
          clearInterval(poll);
          await loadConnections();
          showToast(`${integration} connected successfully!`, "success");
        }
      }, 1000);
    } catch (err) {
      showToast(`Failed to connect: ${err.message}`, "error");
      btn.disabled = false;
      btn.textContent = "Connect";
    }
  }

  // -------------------------------------------------------------------------
  // Data loading
  // -------------------------------------------------------------------------
  async function loadConnections() {
    try {
      const res = await fetch(`${API_BASE}/api/connections?client_id=${encodeURIComponent(clientId)}`);
      if (!res.ok) return;
      const data = await res.json();
      connectedSet = new Set((data.connections || []).map(c => c.provider_config_key || c.providerConfigKey));
      renderFeatured();
      renderAll(allProviders);
    } catch { /* silently ignore */ }
  }

  async function loadProviders() {
    try {
      const res = await fetch(`${API_BASE}/api/providers`);
      if (!res.ok) return;
      allProviders = await res.json();
      renderAll(allProviders);
    } catch { /* silently ignore */ }
  }

  // -------------------------------------------------------------------------
  // Init
  // -------------------------------------------------------------------------
  renderFeatured();
  loadConnections();
  loadProviders();
</script>
</body>
</html>
