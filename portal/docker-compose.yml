version: '3.9'

services:
  portal-api:
    image: node:20-alpine
    container_name: clawbridge-portal-api
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3010:3010"
    volumes:
      - ./api:/app
      - portal-db:/app/data
    environment:
      - PORT=3010
      - DATABASE_PATH=/app/data/portal.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_STARTER_PRICE_ID=${STRIPE_STARTER_PRICE_ID:-price_starter}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-price_pro}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-price_enterprise}
      - NANGO_SECRET_KEY=${NANGO_SECRET_KEY:-}
      - NANGO_SERVER_URL=${NANGO_SERVER_URL:-http://localhost:3003}
      - CORS_ORIGIN=http://localhost:4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  portal-app:
    image: node:20-alpine
    container_name: clawbridge-portal-app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:4000"
    volumes:
      - ./app:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3010
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-ClawBridge}
    depends_on:
      - portal-api
    restart: unless-stopped

volumes:
  portal-db:
